<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International Campus of Science and Technology — Learning Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 50: '#f7ebe9', 100: '#eed7d3', 200: '#dfb1ac', 300: '#c2757f', 400: '#9f3b4f', 500: '#8b1f2d', 600: '#6f1723', 700: '#4f1119', 800: '#3b0c14', 900: '#22060a' },
            gold: { 50: '#fff9e5', 100: '#fff1bf', 200: '#ffe474', 300: '#f4d35e', 400: '#e7c33d', 500: '#d9b21a', 600: '#b18a13', 700: '#8b6910', 800: '#6a4f0d', 900: '#4d3b0a' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="antialiased">

  <div id="toast-container"></div>

  <!-- LOGIN PAGE -->
  <div id="login-page" class="login-bg flex items-center justify-center min-h-screen py-10">
    <div class="relative z-10 w-full max-w-md px-6">
      <div class="w-full mx-auto">
        <div class="text-center mb-10">
          <div
            class="inline-flex items-center justify-center w-24 h-24 rounded-2xl bg-white p-3.5 shadow-2xl mb-6 border border-white/20 glow-pulse">
            <img src="assets/images.png" alt="Campus logo" class="w-full h-full object-contain" />
          </div>
          <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight">International Campus</h1>
          <p class="text-gold-400 font-medium tracking-widest uppercase text-sm mt-1">of Science & Technology</p>
          <p class="text-gray-400 mt-3 text-sm">Learning Management System</p>
        </div>
        <div class="card p-8" style="cursor:default;">
          <h2 id="auth-title" class="text-xl font-bold mb-6 text-center">Sign In</h2>

          <!-- Sign In Form -->
          <div id="signin-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Email</label>
              <input id="login-email" type="email" class="input-field" placeholder="Enter your email">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Password</label>
              <input id="login-password" type="password" class="input-field" placeholder="Enter your password">
            </div>
            <div id="login-error" class="text-red-400 text-sm" style="display:none;"></div>
            <button id="login-btn" class="btn-primary w-full text-center mt-2">Sign In</button>
            <p class="text-xs text-center mt-4" style="color:var(--fg-muted);">
              Don't have an account? <a href="#" id="toggle-to-signup" class="font-semibold"
                style="color:var(--accent);text-decoration:underline;">Sign Up</a>
            </p>
          </div>

          <!-- Sign Up Form (Hidden by default) -->
          <div id="signup-form" class="space-y-4 hidden" style="display:none;">
            <div>
              <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Full Name</label>
              <input id="register-name" type="text" class="input-field" placeholder="Enter your full name">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Email</label>
              <input id="register-email" type="email" class="input-field" placeholder="Enter your email">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Password</label>
              <input id="register-password" type="password" class="input-field" placeholder="Choose a password">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Department</label>
                <select id="register-dept" class="input-field"></select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Role</label>
                <select id="register-role" class="input-field">
                  <option value="student">Student</option>
                  <option value="lecturer">Lecturer</option>
                </select>
              </div>
            </div>
            <div id="register-index-container">
              <label class="block text-sm font-medium mb-1" style="color:var(--fg-muted);">Index Number</label>
              <input id="register-index" type="text" class="input-field" placeholder="e.g. STU-2026-0034">
            </div>
            <div id="register-error" class="text-red-400 text-sm" style="display:none;"></div>
            <button id="register-btn" class="btn-primary w-full text-center mt-2">Submit Registration</button>
            <p class="text-xs text-center mt-4" style="color:var(--fg-muted);">
              Already have an account? <a href="#" id="toggle-to-signin" class="font-semibold"
                style="color:var(--accent);text-decoration:underline;">Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-page" class="hidden">
    <!-- Sidebar Backdrop for Mobile -->
    <div id="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 w-64 h-full flex flex-col z-50 sidebar-desktop"
      style="background:var(--bg-card);border-right:1px solid var(--border);">
      <div class="p-4" style="border-bottom:1px solid var(--border);">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-xl bg-white flex items-center justify-center p-1.5 shadow-md flex-shrink-0">
            <img src="assets/images.png" alt="Campus logo" class="w-full h-full object-contain" />
          </div>
          <div class="min-w-0">
            <h3 class="font-extrabold text-sm leading-tight text-white truncate">ICST Campus</h3>
            <p class="text-[10px] tracking-wider uppercase font-semibold text-gold-400">LMS Portal</p>
          </div>
        </div>
      </div>
      <nav id="sidebar-nav" class="flex-1 py-4 overflow-y-auto scrollbar-thin"></nav>

      <!-- Glassmorphic Analog Clock -->
      <div class="px-6 py-4 flex flex-col items-center justify-center border-t border-white/5"
        style="background: rgba(255, 255, 255, 0.01);">
        <div class="relative w-28 h-28 rounded-full border border-white/10 flex items-center justify-center shadow-lg"
          style="background: rgba(255,255,255,0.02); backdrop-filter: blur(12px); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
          <!-- Center point -->
          <div class="absolute w-2 h-2 rounded-full bg-gold-400 z-30"></div>

          <!-- Outer border ring -->
          <div class="absolute inset-1 rounded-full border border-white/5"></div>

          <div id="clock-hour" class="absolute w-1 h-7 bg-white/60 rounded-full"
            style="bottom: 50%; left:calc(50% - 2px); transform-origin: 50% 100%; transform: rotate(0deg);">
          </div>
          <div id="clock-min" class="absolute w-0.75 h-10 bg-white/80 rounded-full"
            style="bottom: 50%; left:calc(50% - 1.5px); transform-origin: 50% 100%; transform: rotate(0deg);">
          </div>
          <div id="clock-sec" class="absolute w-0.5 h-11 bg-gold-400 rounded-full z-20"
            style="bottom: 50%; left:calc(50% - 1px); transform-origin: 50% 100%; transform: rotate(0deg);">
          </div>

          <!-- Dial Numbers -->
          <span class="absolute text-[8px] font-extrabold text-white/40 top-1.5 font-mono">12</span>
          <span class="absolute text-[8px] font-extrabold text-white/40 right-2 font-mono">3</span>
          <span class="absolute text-[8px] font-extrabold text-white/40 bottom-1.5 font-mono">6</span>
          <span class="absolute text-[8px] font-extrabold text-white/40 left-2 font-mono">9</span>
        </div>
        <!-- Digital clock display -->
        <span id="digital-clock" class="text-xs font-semibold text-gray-300 mt-2 font-mono tracking-wider">00:00:00
          AM</span>
      </div>

      <div class="p-4" style="border-top:1px solid var(--border);">
        <div class="flex items-center gap-3 mb-3">
          <div id="user-avatar" class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold"></div>
          <div class="flex-1 min-w-0">
            <p id="user-name" class="text-sm font-semibold truncate"></p>
            <p id="user-role" class="text-xs capitalize" style="color:var(--fg-muted);"></p>
          </div>
        </div>
        <button id="logout-btn" class="btn-secondary w-full text-sm py-2"><i class="fas fa-sign-out-alt mr-2"></i>Sign
          Out</button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-shell min-h-screen">
      <header class="sticky top-0 z-45 px-4 sm:px-6 lg:px-8 py-4 flex flex-row items-center justify-between"
        style="background:rgba(12,26,18,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);">
        <div class="flex items-center gap-3">
          <button id="sidebar-toggle" class="lg:hidden text-gray-300 hover:text-white p-2 focus:outline-none"
            style="cursor:pointer;background:none;border:none;">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <div>
            <h2 id="page-title" class="text-xl font-bold"></h2>
            <p id="page-subtitle" class="text-sm hidden sm:block" style="color:var(--fg-muted);"></p>
          </div>
        </div>
        <div id="current-date" class="text-sm hidden md:block" style="color:var(--fg-muted);"></div>
      </header>
      <div id="main-content" class="p-8"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-container"></div>

  <script src="js/app.js"></script>
</body>

</html>
